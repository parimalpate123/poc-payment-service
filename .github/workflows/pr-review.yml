name: PR Review Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  MODEL_ID: us.anthropic.claude-3-5-sonnet-20241022-v2:0

jobs:
  review:
    # startsWith (not contains) prevents re-trigger from action's review comments
    # that may mention @pragent in the body but don't start with it
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '@pragent')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: pr-review-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Extract incident ID for webhook tracking
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "🔍 Extracting incident ID for PR #$PR_NUMBER"

          # Get PR details with more fields
          PR_DATA=$(gh pr view "$PR_NUMBER" --json title,body,number 2>/dev/null || echo "{}")
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title // ""' 2>/dev/null || echo "")
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""' 2>/dev/null || echo "")
          
          echo "📋 PR Title: $PR_TITLE"
          echo "📄 PR Body preview: ${PR_BODY:0:200}..."

          # FIRST: Try to extract incident ID from PR labels (most reliable method)
          # Labels are added by auto-fix.yml in format: "incident-chat-xxx"
          # Use GitHub API directly to get labels (more reliable than gh pr view)
          echo "🔍 Checking PR labels via GitHub API..."
          PR_LABELS_JSON=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER" --jq '.labels' 2>/dev/null || echo "[]")
          PR_LABELS=$(echo "$PR_LABELS_JSON" | jq -r '.[].name' 2>/dev/null | tr '\n' ' ' || echo "")
          
          echo "🏷️ PR Labels: $PR_LABELS"
          echo "🔍 Raw labels JSON: $(echo "$PR_LABELS_JSON" | jq -c '.' 2>/dev/null || echo 'null')"
          
          if [ -n "$PR_LABELS" ]; then
            # Search for label matching pattern "incident-chat-xxx"
            INCIDENT_LABEL=$(echo "$PR_LABELS" | grep -oE 'incident-(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
            if [ -n "$INCIDENT_LABEL" ]; then
              # Extract incident ID from label (format: "incident-chat-xxx" -> "chat-xxx")
              INCIDENT_ID=$(echo "$INCIDENT_LABEL" | sed 's/^incident-//' || echo "")
              if [ -n "$INCIDENT_ID" ]; then
                echo "✅ Found incident ID $INCIDENT_ID from PR label: $INCIDENT_LABEL"
              fi
            else
              echo "⚠️ No incident label found in PR labels: $PR_LABELS"
            fi
          else
            echo "⚠️ No labels found on PR #$PR_NUMBER"
          fi

          # If not found in labels, try to extract incident ID from PR title (format: "Fix: ... - chat-xxx")
          # Pattern: chat- followed by alphanumeric and hyphens
          if [ -z "$INCIDENT_ID" ]; then
            INCIDENT_ID=$(echo "$PR_TITLE" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
            echo "🔍 After checking PR title: '$INCIDENT_ID'"
          fi
          
          # If not found in title, try PR body
          if [ -z "$INCIDENT_ID" ]; then
            echo "⚠️ Incident ID not found in PR title, checking body..."
            INCIDENT_ID=$(echo "$PR_BODY" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
            echo "🔍 After checking PR body: '$INCIDENT_ID'"
          fi
          
          # If still not found, check PR comments for incident ID
          # The auto-fix workflow or other processes might have commented with incident ID
          if [ -z "$INCIDENT_ID" ]; then
            echo "⚠️ Incident ID not found in PR, checking PR comments..."
            PR_COMMENTS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --jq '.[].body' 2>/dev/null || echo "")
            if [ -n "$PR_COMMENTS" ]; then
              INCIDENT_ID=$(echo "$PR_COMMENTS" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
              if [ -n "$INCIDENT_ID" ]; then
                echo "✅ Found incident ID $INCIDENT_ID in PR comments"
              fi
            fi
          fi
          
          # If still not found, try to find the original issue that created this PR
          # When PRs are created from issues, they're linked. Check PR head branch name for issue number
          if [ -z "$INCIDENT_ID" ]; then
            echo "⚠️ Incident ID not found in PR comments, checking PR head branch for issue reference..."
            
            # Get PR head branch name (often contains issue number like "issue-123" or "fix-123")
            PR_HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName // ""' 2>/dev/null || echo "")
            echo "🌿 PR head branch: $PR_HEAD_BRANCH"
            
            # Extract potential issue number from branch name
            POTENTIAL_ISSUE_NUM=$(echo "$PR_HEAD_BRANCH" | grep -oE '[0-9]+' | head -1 || echo "")
            
            if [ -n "$POTENTIAL_ISSUE_NUM" ]; then
              echo "🔍 Found potential issue number in branch: #$POTENTIAL_ISSUE_NUM"
              # Try to get issue body
              ISSUE_BODY=$(gh issue view "$POTENTIAL_ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || echo "")
              if [ -n "$ISSUE_BODY" ]; then
                echo "📄 Issue #$POTENTIAL_ISSUE_NUM body preview: ${ISSUE_BODY:0:200}..."
                # Extract incident ID from issue body
                INCIDENT_ID=$(echo "$ISSUE_BODY" | grep -oE 'Incident(?: ID)?:\s*((chat|cw|inc|test)-[a-z0-9-]+)' | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                if [ -z "$INCIDENT_ID" ]; then
                  INCIDENT_ID=$(echo "$ISSUE_BODY" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                fi
                if [ -n "$INCIDENT_ID" ]; then
                  echo "✅ Found incident ID $INCIDENT_ID in issue #$POTENTIAL_ISSUE_NUM"
                fi
              fi
            fi
          fi
          
          # If still not found, try to get linked issue using GitHub API
          # When PRs are created from issues, they're linked via the issueUrl field
          if [ -z "$INCIDENT_ID" ]; then
            echo "⚠️ Incident ID still not found, checking PR's linked issue via GitHub API..."
            
            # Get PR details including issueUrl (if PR was created from an issue)
            PR_FULL_DATA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" 2>/dev/null || echo "{}")
            LINKED_ISSUE_URL=$(echo "$PR_FULL_DATA" | jq -r '.issue_url // ""' 2>/dev/null || echo "")
            
            if [ -n "$LINKED_ISSUE_URL" ] && [ "$LINKED_ISSUE_URL" != "null" ]; then
              # Extract issue number from URL (format: https://api.github.com/repos/owner/repo/issues/123)
              LINKED_ISSUE_NUM=$(echo "$LINKED_ISSUE_URL" | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
              echo "🔗 Found linked issue URL: $LINKED_ISSUE_URL (issue #$LINKED_ISSUE_NUM)"
              
              if [ -n "$LINKED_ISSUE_NUM" ]; then
                LINKED_ISSUE_BODY=$(gh issue view "$LINKED_ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || echo "")
                LINKED_ISSUE_TITLE=$(gh issue view "$LINKED_ISSUE_NUM" --json title --jq '.title // ""' 2>/dev/null || echo "")
                
                if [ -n "$LINKED_ISSUE_BODY" ] || [ -n "$LINKED_ISSUE_TITLE" ]; then
                  echo "📄 Linked issue #$LINKED_ISSUE_NUM title: $LINKED_ISSUE_TITLE"
                  echo "📄 Linked issue #$LINKED_ISSUE_NUM body preview: ${LINKED_ISSUE_BODY:0:200}..."
                  
                  # Extract incident ID from linked issue
                  INCIDENT_ID=$(echo "$LINKED_ISSUE_BODY" | grep -oE 'Incident(?: ID)?:\s*((chat|cw|inc|test)-[a-z0-9-]+)' | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                  if [ -z "$INCIDENT_ID" ]; then
                    INCIDENT_ID=$(echo "$LINKED_ISSUE_BODY" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                  fi
                  if [ -z "$INCIDENT_ID" ]; then
                    INCIDENT_ID=$(echo "$LINKED_ISSUE_TITLE" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                  fi
                  
                  if [ -n "$INCIDENT_ID" ]; then
                    echo "✅ Found incident ID $INCIDENT_ID in linked issue #$LINKED_ISSUE_NUM"
                  fi
                fi
              fi
            fi
          fi
          
          # If still not found, search for ALL recent issues (not just auto-fix labeled)
          # PRs created from issues are usually created shortly after the issue
          if [ -z "$INCIDENT_ID" ]; then
            echo "⚠️ Incident ID still not found, searching for ALL recent issues..."
            
            # Get recent issues (last 30, sorted by creation date, most recent first)
            # Search all issues, not just auto-fix labeled ones
            ALL_ISSUES=$(gh issue list --state all --limit 30 --json number,title,body,createdAt,labels --jq 'sort_by(.createdAt) | reverse' 2>/dev/null || echo "[]")
            ISSUE_COUNT=$(echo "$ALL_ISSUES" | jq '. | length' 2>/dev/null || echo "0")
            echo "📋 Found $ISSUE_COUNT recent issue(s) (all states)"
            
            # Get PR creation time to find issues created before PR
            PR_CREATED_AT=$(gh pr view "$PR_NUMBER" --json createdAt --jq '.createdAt // ""' 2>/dev/null || echo "")
            echo "🕐 PR created at: $PR_CREATED_AT"
            
            # Check each issue for incident ID, prioritizing recent ones
            for i in $(seq 0 $((ISSUE_COUNT - 1))); do
              ISSUE_NUM=$(echo "$ALL_ISSUES" | jq -r ".[$i].number" 2>/dev/null || echo "")
              ISSUE_TITLE=$(echo "$ALL_ISSUES" | jq -r ".[$i].title" 2>/dev/null || echo "")
              ISSUE_BODY=$(echo "$ALL_ISSUES" | jq -r ".[$i].body" 2>/dev/null || echo "")
              ISSUE_LABELS=$(echo "$ALL_ISSUES" | jq -r ".[$i].labels[].name" 2>/dev/null || echo "")
              
              if [ -n "$ISSUE_NUM" ]; then
                # Try to extract incident ID from issue body
                TEMP_ID=$(echo "$ISSUE_BODY" | grep -oE 'Incident(?: ID)?:\s*((chat|cw|inc|test)-[a-z0-9-]+)' | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                
                # If not found with "Incident:" prefix, try anywhere in body
                if [ -z "$TEMP_ID" ]; then
                  TEMP_ID=$(echo "$ISSUE_BODY" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                fi
                
                # Also check issue title (format: "Fix: ... - chat-xxx")
                if [ -z "$TEMP_ID" ]; then
                  TEMP_ID=$(echo "$ISSUE_TITLE" | grep -oE '(chat|cw|inc|test)-[a-z0-9-]+' | head -1 || echo "")
                fi
                
                if [ -n "$TEMP_ID" ]; then
                  # Use the first issue found with an incident ID (most recent)
                  echo "✅ Found incident ID $TEMP_ID in issue #$ISSUE_NUM (labels: $ISSUE_LABELS)"
                  INCIDENT_ID="$TEMP_ID"
                  break
                fi
              fi
            done
          fi

          if [ -z "$INCIDENT_ID" ]; then
            echo "❌ Could not extract incident ID from PR #$PR_NUMBER"
            echo "💡 PR title: $PR_TITLE"
            echo "💡 PR body length: ${#PR_BODY}"
            echo "💡 This is OK - webhook steps will be skipped but PR review will still run"
          else
            echo "✅ Extracted incident ID: $INCIDENT_ID"
          fi
          
          echo "incident_id=$INCIDENT_ID" >> $GITHUB_OUTPUT

      - name: Notify webhook - Review started
        if: always() && steps.info.outputs.incident_id != ''
        run: |
          curl -sX POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"action":"remediation_webhook","source":"github_actions","incident_id":"${{ steps.info.outputs.incident_id }}","pr_number":${{ steps.info.outputs.pr_number }},"status":"pr_review_started","message":"PR Review Agent is analyzing the pull request"}' || true

      - name: Run PR Review Agent
        id: review
        uses: parimalpate123/pr-code-review-action@justbedrock
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          model: ${{ env.MODEL_ID }}
          bedrock_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          max_tokens: "25000"
          timeout_minutes: "30"

      - name: Notify webhook - Review completed
        if: always() && steps.info.outputs.incident_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Checking PR review status for PR #${{ steps.info.outputs.pr_number }}"
          
          # Get PR reviews
          REVIEWS=$(gh api "repos/${{ github.repository }}/pulls/${{ steps.info.outputs.pr_number }}/reviews" 2>/dev/null || echo "[]")
          REVIEW_COUNT=$(echo "$REVIEWS" | jq '. | length' 2>/dev/null || echo "0")
          
          echo "📊 Found $REVIEW_COUNT review(s)"
          
          if [ "$REVIEW_COUNT" -gt 0 ]; then
            REVIEW_STATE=$(echo "$REVIEWS" | jq -r '.[-1].state // "PENDING"' 2>/dev/null || echo "PENDING")
            REVIEWER=$(echo "$REVIEWS" | jq -r '.[-1].user.login // "unknown"' 2>/dev/null || echo "unknown")
            echo "✅ Latest review state: $REVIEW_STATE (by $REVIEWER)"
          else
            REVIEW_STATE="PENDING"
            echo "⚠️ No reviews found, checking for review comments..."
            
            # Check if PR Review Agent posted a comment (might not submit formal review)
            COMMENTS=$(gh api "repos/${{ github.repository }}/issues/${{ steps.info.outputs.pr_number }}/comments" --jq '[.[] | select(.user.login | contains("bot") or contains("action") or contains("github-actions"))] | length' 2>/dev/null || echo "0")
            echo "💬 Found $COMMENTS bot comment(s)"
            
            if [ "$COMMENTS" -gt 0 ]; then
              # If there are bot comments, assume review was completed (even if not formal review)
              # The action might post comments instead of submitting reviews
              REVIEW_STATE="COMMENTED"
              echo "✅ PR Review Agent posted comment(s), treating as review completed"
            elif [ "${{ steps.review.outcome }}" = "success" ]; then
              # The review action uses PAT_TOKEN, so comments are authored by the PAT owner
              # (not a bot user). If the step succeeded, the review was completed.
              REVIEW_STATE="COMMENTED"
              echo "✅ PR Review Agent step succeeded, treating as review completed"
            fi
          fi

          case "$REVIEW_STATE" in
            APPROVED) STATUS="approved" ;;
            CHANGES_REQUESTED) STATUS="changes_requested" ;;
            COMMENTED) STATUS="approved" ;; # Treat comments as approved for now
            *) STATUS="pending" ;;
          esac

          echo "📤 Sending webhook with status: $STATUS"
          
          WEBHOOK_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"action\":\"remediation_webhook\",\"source\":\"github_actions\",\"incident_id\":\"${{ steps.info.outputs.incident_id }}\",\"pr_number\":${{ steps.info.outputs.pr_number }},\"status\":\"pr_reviewed\",\"review_status\":\"$STATUS\"}" 2>&1)
          
          HTTP_CODE=$(echo "$WEBHOOK_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$WEBHOOK_RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Webhook call successful (HTTP $HTTP_CODE)"
            echo "Response: $RESPONSE_BODY"
          else
            echo "❌ Webhook call failed (HTTP $HTTP_CODE)"
            echo "Response: $RESPONSE_BODY"
            exit 1
          fi
