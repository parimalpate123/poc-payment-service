name: PR Review Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  MODEL_ID: us.anthropic.claude-3-5-sonnet-20241022-v2:0

jobs:
  review:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@pragent')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Extract incident ID for webhook tracking
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # Extract incident ID (chat-xxx) from PR title/body if present
          INCIDENT_ID=$(gh pr view "$PR_NUMBER" --json title,body --jq '[.title, .body] | join(" ")' 2>/dev/null \
            | grep -oE 'chat-[a-z0-9-]+' | head -1 || true)
          echo "incident_id=$INCIDENT_ID" >> $GITHUB_OUTPUT

      - name: Notify webhook - Review started
        if: steps.info.outputs.incident_id != ''
        run: |
          curl -sX POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"action":"remediation_webhook","source":"github_actions","incident_id":"${{ steps.info.outputs.incident_id }}","pr_number":${{ steps.info.outputs.pr_number }},"status":"pr_review_started","message":"PR Review Agent is analyzing the pull request"}' || true

      - name: Run PR Review Agent
        uses: parimalpate123/pr-code-review-action@justbedrock
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          model: ${{ env.MODEL_ID }}
          bedrock_region: ${{ secrets.AWS_REGION || 'us-east-1' }}
          max_tokens: "25000"
          timeout_minutes: "30"

      - name: Notify webhook - Review completed
        if: steps.info.outputs.incident_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW_STATE=$(gh api "repos/${{ github.repository }}/pulls/${{ steps.info.outputs.pr_number }}/reviews" \
            --jq '.[-1].state // "PENDING"' 2>/dev/null || echo "PENDING")

          case "$REVIEW_STATE" in
            APPROVED) STATUS="approved" ;;
            CHANGES_REQUESTED) STATUS="changes_requested" ;;
            *) STATUS="pending" ;;
          esac

          curl -sX POST "${{ secrets.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"action\":\"remediation_webhook\",\"source\":\"github_actions\",\"incident_id\":\"${{ steps.info.outputs.incident_id }}\",\"pr_number\":${{ steps.info.outputs.pr_number }},\"status\":\"pr_reviewed\",\"review_status\":\"$STATUS\"}" || true
